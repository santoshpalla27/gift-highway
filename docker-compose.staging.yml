# Staging compose — identical to prod but builds from local source instead of pre-built images.
# Usage:
#   1. Copy .env.prod.example → .env.staging and fill in values.
#   2. Run: docker compose -f docker-compose.staging.yml --env-file .env.staging up -d --build
#   3. Tear down: docker compose -f docker-compose.staging.yml --env-file .env.staging down

services:
  traefik:
    image: traefik:v3.6.10
    container_name: app-traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.41
      - CF_API_TOKEN=${CF_API_TOKEN}
    command:
      - --api.dashboard=false
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.endpoint=unix:///var/run/docker.sock
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --log.level=INFO
      - --accesslog=false
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt-data:/letsencrypt
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.http-catchall.rule=HostRegexp(`.+`)
      - traefik.http.routers.http-catchall.entrypoints=web
      - traefik.http.routers.http-catchall.middlewares=redirect-to-https
      - traefik.http.routers.http-catchall.priority=1
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: app-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=256MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=32MB
      - -c
      - max_connections=50
      - -c
      - wal_buffers=8MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-appdb}
      - POSTGRES_USER=${POSTGRES_USER:-app}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-appdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: app-backend
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - PORT=8080
      - DATABASE_URL=postgres://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-appdb}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRY=${JWT_EXPIRY:-15m}
      - REFRESH_EXPIRY=${REFRESH_EXPIRY:-720h}
      - ALLOWED_ORIGINS=https://${DOMAIN}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY=${R2_ACCESS_KEY}
      - R2_SECRET_KEY=${R2_SECRET_KEY}
      - R2_BUCKET=${R2_BUCKET}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.backend.entrypoints=websecure
      - traefik.http.routers.backend.tls.certresolver=letsencrypt
      - traefik.http.routers.backend.priority=10
      - traefik.http.services.backend.loadbalancer.server.port=8080
      # WebSocket support
      - traefik.http.middlewares.ws-headers.headers.customrequestheaders.X-Forwarded-Proto=https
      - traefik.http.routers.backend.middlewares=ws-headers
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend-web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://${DOMAIN}/api/v1
    container_name: app-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls.certresolver=letsencrypt
      - traefik.http.routers.frontend.priority=1
      - traefik.http.services.frontend.loadbalancer.server.port=80
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.25"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

  monitor:
    build:
      context: ./monitor
      dockerfile: Dockerfile
    container_name: app-monitor
    restart: unless-stopped
    environment:
      - PORT=9090
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - GOGC=20
      - GOMEMLIMIT=28MiB
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/app-backup.log:/var/log/app-backup.log:ro
    networks:
      - app-net
    labels:
      - traefik.enable=true
      - traefik.http.routers.monitor.rule=Host(`${MONITOR_DOMAIN}`)
      - traefik.http.routers.monitor.entrypoints=websecure
      - traefik.http.routers.monitor.tls.certresolver=letsencrypt
      - traefik.http.middlewares.monitor-auth.basicauth.users=${ADMIN_AUTH}
      - traefik.http.routers.monitor.middlewares=monitor-auth
      - traefik.http.services.monitor.loadbalancer.server.port=9090
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: "0.10"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  postgres-data:
  letsencrypt-data:

networks:
  app-net:
    driver: bridge
